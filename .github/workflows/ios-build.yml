name: Build AnyGram iOS IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  SCHEME: example
  WORKSPACE: ios/example.xcworkspace
  ARCHIVE_PATH: ios/build/AnyGram.xcarchive
  EXPORT_PATH: ios/build/ipa
  IPA_NAME: AnyGram.ipa

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Bundler gems
        run: bundle install

      - name: Install CocoaPods dependencies
        working-directory: .
        run: |
          gem install cocoapods --no-document || true
          cd ios && pod install --repo-update

      - name: Detect signing credentials
        id: signing
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ] && \
             [ -n "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" ] && \
             [ -n "${{ secrets.APPLE_TEAM_ID }}" ] && \
             [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.has_signing == 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build and archive (signed)
        if: steps.signing.outputs.has_signing == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          mkdir -p ios/build
          xcodebuild \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

      - name: Build and archive (unsigned)
        if: steps.signing.outputs.has_signing == 'false'
        run: |
          mkdir -p ios/build
          xcodebuild \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Export signed IPA
        if: steps.signing.outputs.has_signing == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p "${{ env.EXPORT_PATH }}"
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            -exportPath "${{ env.EXPORT_PATH }}" \
            -exportOptionsPlist ios/ExportOptions.plist
          mv "${{ env.EXPORT_PATH }}"/*.ipa "${{ env.EXPORT_PATH }}/${{ env.IPA_NAME }}"

      - name: Package unsigned IPA
        if: steps.signing.outputs.has_signing == 'false'
        run: |
          APP_PATH="${{ env.ARCHIVE_PATH }}/Products/Applications/example.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find "${{ env.ARCHIVE_PATH }}" -name "*.app" -type d | head -n 1)
          fi
          mkdir -p "${{ env.EXPORT_PATH }}/Payload"
          cp -R "$APP_PATH" "${{ env.EXPORT_PATH }}/Payload/"
          cd "${{ env.EXPORT_PATH }}"
          zip -qr "${{ env.IPA_NAME }}" Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS-${{ github.sha }}
          path: ${{ env.EXPORT_PATH }}/${{ env.IPA_NAME }}
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        run: |
          echo "## AnyGram iOS Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scheme: \`${{ env.SCHEME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Signed: \`${{ steps.signing.outputs.has_signing }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- IPA: \`${{ env.IPA_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          ls -lh "${{ env.EXPORT_PATH }}/${{ env.IPA_NAME }}"
